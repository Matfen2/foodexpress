# Nom de l'application
spring.application.name=foodexpress

# Profil actif par défaut (développement)
spring.profiles.active=dev

# Port du serveur
server.port=8080

# Bonne pratique : désactiver Open-In-View (évite les requêtes SQL dans les vues)
spring.jpa.open-in-view=false

# Actuator — endpoints exposés
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Infos sur l'application
info.app.name=FoodExpress
info.app.version=1.0.0
info.app.description=Systeme de commande de livraison